services:
  mysql:
    image: mysql:8.4
    container_name: valaiyagam-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-valaiyagam}
      MYSQL_USER: ${MYSQL_USER:-valaiyagam}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-valaiyagam_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - valaiyagam-network

  backend:
    build:
      context: ./backend
    container_name: valaiyagam-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-local-development-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-valaiyagam}
      MYSQL_USER: ${MYSQL_USER:-valaiyagam}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-valaiyagam_dev}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-ChangeMe123!}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-System Admin}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - valaiyagam-network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN:-http://localhost:8000}
    container_name: valaiyagam-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - valaiyagam-network

volumes:
  mysql_data:
  backend_uploads:

networks:
  valaiyagam-network:
    name: valaiyagam-network
    driver: bridge
